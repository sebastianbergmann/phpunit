name: "Lock Threads"

on:
  schedule:
    - cron: "0 0 * * *"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions: {}

jobs:
  lock-threads:
    name: Lock Threads
    runs-on: ubuntu-latest

    permissions:
      issues: write        # needed by dessant/lock-threads to lock inactive issues
      pull-requests: write # needed by dessant/lock-threads to lock inactive PRs

    steps:
      - uses: dessant/lock-threads@89ae32b08ed1a541efecbab17912962a5e38981c # v6.0.2
        with:
          issue-inactive-days: 30
          pr-inactive-days: 30
