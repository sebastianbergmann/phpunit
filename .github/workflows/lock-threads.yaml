name: "Lock Threads"

on:
  schedule:
    - cron: "0 0 * * *"

permissions:
  issues: write
  pull-requests: write

jobs:
  lock-threads:
    runs-on: ubuntu-latest

    steps:
      - uses: dessant/lock-threads@7266a7ce5c1df01b1c6db85bf8cd86c737dadbe7 # v6
        with:
          issue-inactive-days: 30
          pr-inactive-days: 30
