# https://github.com/marketplace/actions/api-surface-check-for-php

on:
  workflow_run:
    workflows: ["API Surface Check"]
    types: [completed]

name: "API Surface Comment"

permissions: {}

concurrency:
  group: api-surface-comment-${{ github.event.workflow_run.head_repository.full_name }}-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  check-api-surface:
    name: API Surface Comment
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # needed to post the API surface diff as a PR comment
    steps:
      - uses: composer/api-surface-check@8817bcdb1d067675d726060181f579bac4c3cd98 # main
        with:
          install-dependencies: false
          paths: src/**/*.php
          source-roots: src
          include-internal: false
          show-removed: true
          show-modified: true
